name: build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, x86]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild WindowsProject1.sln /m /p:Configuration=Release /p:Platform=${{ matrix.platform }}

      - name: Collect exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter WindowsProject1.exe | Select-Object -First 1
          if (-not $exe) { throw "WindowsProject1.exe not found" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $exe.FullName "dist/MoveTheMouse-${{ matrix.platform }}.exe"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MoveTheMouse-${{ matrix.platform }}
          path: dist/MoveTheMouse-${{ matrix.platform }}.exe
          if-no-files-found: error
