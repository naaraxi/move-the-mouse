name: build

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, x86]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild WindowsProject1.sln /m /p:Configuration=Release /p:Platform=${{ matrix.platform }}

      - name: Collect exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter WindowsProject1.exe | Select-Object -First 1
          if (-not $exe) { throw "WindowsProject1.exe not found" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $exe.FullName "dist/MoveTheMouse-${{ matrix.platform }}.exe"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MoveTheMouse-${{ matrix.platform }}
          path: dist/MoveTheMouse-${{ matrix.platform }}.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    # Only publish a release from the default branch, not from other branches/PRs.
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Download built exes
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Automatic build of the latest `master` (commit ${{ github.sha }}).

            - `MoveTheMouse-x64.exe` - 64-bit
            - `MoveTheMouse-x86.exe` - 32-bit

            Unsigned - Windows SmartScreen may warn on first run (More info -> Run anyway).
          files: artifacts/**/*.exe
          fail_on_unmatched_files: true
